name: hisabi
description: "Hisabi - Personal Finance Manager for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  intl: ^0.19.0
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  image_picker: ^1.0.4
  local_auth: ^2.1.3
  url_launcher: ^6.2.1
  flutter_local_notifications: ^17.0.0
  google_fonts: ^6.1.0
  pdf: ^3.10.4
  printing: ^5.13.1
  excel: ^4.0.3
  path_provider: ^2.1.1
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
